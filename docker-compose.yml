version: "3.9"
services:
  postgres:
    image: postgres:16
    environment: { POSTGRES_USER: caliber, POSTGRES_PASSWORD: caliber, POSTGRES_DB: caliber }
    ports: ["5432:5432"]
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment: { ZOOKEEPER_CLIENT_PORT: 2181 }
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  backend:
    build: ./backend
    depends_on: [postgres, kafka]
    environment:
      DATABASE_URL: postgresql+psycopg2://caliber:caliber@postgres:5432/caliber
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: inference-events
    ports: ["8000:8000"]
    command: bash -c "python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"
  simulator:
    build: ./backend
    depends_on: [backend, kafka]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: inference-events
      MODEL_VERSION_ID: "1"
    command: ["python", "simulator/produce_events.py"]
